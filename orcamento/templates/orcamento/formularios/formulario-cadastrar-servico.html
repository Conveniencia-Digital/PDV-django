{% load widget_tweaks %}
<div class="modal-header">
    <h5 class="modal-title" id="exampleModalToggle"> Cadastrar serviço </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form
    hx-post="{% url 'cadastrar-servico' %}{% if service_picker_mode %}?picker=1{% endif %}"
    hx-target="{% if service_picker_mode %}#orcamentoServicoPickerModalConteudo{% else %}#addConteudo{% endif %}"
    hx-swap="innerHTML">
        
    <div class="modal-body">
        {% csrf_token %}
        {% if service_picker_mode %}
          <input type="hidden" name="service_picker" value="1">
        {% endif %}
        <div class="row g-2" style="margin-bottom: 10px;">
            <div class="col form-floating">
                {% render_field form.usuario class='form-control' %}
                {% render_field form.servico class='form-control' %}
                <label for="">Informe o servico</label>
                {% for error in form.servico.errors %}
                  <div class="invalid-feedback d-block">{{ error }}</div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-outline-primary">Cadastrar</button>
    </div>
</form>
