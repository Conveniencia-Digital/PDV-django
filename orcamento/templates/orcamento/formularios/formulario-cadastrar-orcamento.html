{% load widget_tweaks %}
<div class="modal-header">
  <h5 class="modal-title" id="staticBackdropLabel"> Novo orcamento </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form class="lanhouse-modal-form" hx-post="{% url 'cadastrar-orcamento' %}" hx-target="#addConteudo" hx-indicator=".htmx-indicator"
  hx-swap="innerHTML" data-card-fee-url="{% url 'preview-taxa-cartao-orcamento' %}" data-card-total-target="#totalValue">
  {% csrf_token %}
  <input type="hidden" name="submission_token" value="{{ submission_token }}">
  <input type="hidden" name="dashboard_periodo" value="{{ dashboard_periodo }}">
  <input type="hidden" name="dashboard_inicio" value="{{ dashboard_inicio }}">
  <input type="hidden" name="dashboard_fim" value="{{ dashboard_fim }}">

  {% include 'orcamento/formularios/campos-orcamento.html' %}

  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-outline-primary">Finalizar</button>
  </div>
</form>
