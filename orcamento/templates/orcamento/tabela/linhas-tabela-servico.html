<tr id="tr-Categoria{{ object.pk }}">

    <td>{{ object.servico }}</td>
    <td><span class="text-muted">—</span></td>
    <td><span hx-post="{% url 'apagarservico' object.pk %}" hx-target="closest tr"
            hx-swap="outerHTML swap:1s"
            hx-confirm="Tem certeza que deseja excluir este serviço?">
            <i class="fa fa-trash-can"></i>
        </span>
    </td>
</tr>
